<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Viewer</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main>
      <h1>Document Viewer</h1>
      <section class="search-section">
        <label for="query-input">Search documents</label>
        <div class="search-row">
          <input id="query-input" type="text" placeholder="Enter a query" />
          <button id="search-button" type="button">Search</button>
        </div>
        <div id="search-results-container">
          <p class="message">Search is ready. Enter a query and click Search.</p>
        </div>
      </section>
      <p>Click the button below to load all documents from the backend.</p>
      <button id="load-documents">Load Documents</button>
      <div id="documents-container"></div>
    </main>
    <script src="/static/script.js?cachebust=2" defer></script>
  </body>
</html>
